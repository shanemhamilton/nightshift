name: CI

on:
  push:
  pull_request:

jobs:
  selftests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run selftest_lifecycle
        run: python3 scripts/selftest_lifecycle.py

      - name: Run selftest_optimizer
        run: python3 scripts/selftest_optimizer.py

      - name: Run selftest_state
        run: python3 scripts/selftest_state.py

      - name: Run selftest_digest
        run: python3 scripts/selftest_digest.py
