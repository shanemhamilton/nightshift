<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070b1a"/>
      <stop offset="0.55" stop-color="#0d1430"/>
      <stop offset="1" stop-color="#161e44"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#bcd2ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#bcd2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdfcf4"/>
      <stop offset="1" stop-color="#c7cdf0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="1280" height="640" fill="black"/>
      <circle cx="1050" cy="150" r="78" fill="white"/>
      <circle cx="1022" cy="135" r="70" fill="black"/>
    </mask>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#sky)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="80" cy="70" r="1.6" opacity="0.8"/><circle cx="160" cy="140" r="1.1" opacity="0.5"/>
    <circle cx="240" cy="60" r="1.3" opacity="0.7"/><circle cx="300" cy="200" r="1" opacity="0.4"/>
    <circle cx="420" cy="90" r="1.7" opacity="0.85"/><circle cx="520" cy="160" r="1.1" opacity="0.5"/>
    <circle cx="610" cy="70" r="1.2" opacity="0.6"/><circle cx="700" cy="210" r="1" opacity="0.4"/>
    <circle cx="780" cy="110" r="1.5" opacity="0.75"/><circle cx="880" cy="60" r="1.1" opacity="0.5"/>
    <circle cx="960" cy="230" r="1.3" opacity="0.6"/><circle cx="1140" cy="90" r="1.6" opacity="0.8"/>
    <circle cx="1200" cy="250" r="1.1" opacity="0.5"/><circle cx="120" cy="300" r="1.2" opacity="0.55"/>
    <circle cx="60" cy="420" r="1.4" opacity="0.6"/><circle cx="220" cy="470" r="1" opacity="0.4"/>
    <circle cx="380" cy="520" r="1.5" opacity="0.7"/><circle cx="520" cy="560" r="1.1" opacity="0.45"/>
    <circle cx="980" cy="430" r="1.2" opacity="0.5"/><circle cx="1100" cy="500" r="1.5" opacity="0.7"/>
    <circle cx="1210" cy="430" r="1.1" opacity="0.5"/><circle cx="700" cy="540" r="1.2" opacity="0.5"/>
    <circle cx="340" cy="300" r="1" opacity="0.35"/><circle cx="1040" cy="330" r="1" opacity="0.4"/>
  </g>

  <!-- moon -->
  <circle cx="1036" cy="142" r="150" fill="url(#moonGlow)"/>
  <rect width="1280" height="640" fill="url(#moon)" mask="url(#crescent)"/>

  <!-- wordmark -->
  <text x="96" y="300" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="-3" fill="#f4f6ff">night<tspan fill="url(#accent)">shift</tspan></text>

  <!-- tagline -->
  <text x="100" y="362" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="500" fill="#aab4e6">Your AI agents don&#8217;t clock out.</text>
  <text x="100" y="408" font-family="Georgia, Times New Roman, serif" font-size="27" font-style="italic" fill="#7f8bc4">Recurring automations that behave like reliable operators &#8212; not stateless prompts.</text>

  <!-- agents row -->
  <g stroke="#2b3566" stroke-width="1.2" fill="#ffffff" fill-opacity="0.05">
    <rect x="100" y="474" width="172" height="44" rx="22"/>
    <rect x="288" y="474" width="200" height="44" rx="22"/>
    <rect x="504" y="474" width="184" height="44" rx="22"/>
    <rect x="704" y="474" width="132" height="44" rx="22"/>
  </g>
  <g font-family="SF Mono, Menlo, Consolas, monospace" font-size="20" fill="#9aa6df">
    <text x="186" y="502" text-anchor="middle">Codex</text>
    <text x="388" y="502" text-anchor="middle">Claude Code</text>
    <text x="596" y="502" text-anchor="middle">Gemini CLI</text>
    <text x="770" y="502" text-anchor="middle">Cursor</text>
  </g>

  <!-- footer -->
  <text x="100" y="588" font-family="SF Mono, Menlo, Consolas, monospace" font-size="19" fill="#5b659c">github.com/shanemhamilton/nightshift</text>
  <text x="1180" y="588" text-anchor="end" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="600" fill="#5b659c">MIT licensed</text>
</svg>
